name: Validate Data (Reusable)

on:
  workflow_call:
    inputs:
      pr_body:
        description: "PR description body for template validation"
        type: string
        required: false
        default: ''

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pin scripts to main
        run: |
          git fetch origin main
          git checkout origin/main -- scripts/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check JSON formatting
        run: npx prettier --check "**/*.json"

      - name: Validate PR Template
        if: inputs.pr_body != ''
        env:
          PR_BODY: ${{ inputs.pr_body }}
        run: |
          echo "Validating PR description..."

          if ! echo "$PR_BODY" | grep -qEi "(- \[x\] (🐛 Bug fix|✨ New feature|💥 Breaking change|🧹 Chore))"; then
            echo "::error::Validation Failed: Please select at least one 'Type of Change' in your PR description."
            exit 1
          fi

          if echo "$PR_BODY" | sed -n '/## Checklist/,$p' | grep -q "\[ \]"; then
            echo "::error::Validation Failed: Please ensure all items in the 'Checklist' are completed and checked."
            exit 1
          fi

          echo "PR Template validation passed!"

      - name: Aggregate JSON files
        run: python3 scripts/aggregate.py

      - name: Lint produced JSON files
        run: python3 scripts/lint_data.py
