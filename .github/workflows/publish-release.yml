name: Publish Data Release

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version Bump
        id: bump_type
        run: |
          BODY="${{ github.event.pull_request.body }}"
          if [[ "$BODY" == *"[x] 💥 Breaking change"* ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ "$BODY" == *"[x] ✨ New feature"* ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          elif [[ "$BODY" == *"[x] 🐛 Bug fix"* ]]; then
            echo "type=patch" >> $GITHUB_OUTPUT
          else
            echo "type=none" >> $GITHUB_OUTPUT
          fi

      - name: Create Tag
        if: steps.bump_type.outputs.type != 'none'
        id: tag_version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: ${{ steps.bump_type.outputs.type }}
          WITH_V: true

      - name: Aggregate JSON files
        if: steps.bump_type.outputs.type != 'none'
        run: python3 scripts/aggregate.py

      - name: Lint produced JSON files
        if: steps.bump_type.outputs.type != 'none'
        run: python3 scripts/lint_data.py

      - name: Zip character images
        if: steps.bump_type.outputs.type != 'none'
        run: zip -j build/character_images.zip character_images/*

      - name: Create GitHub Release
        if: steps.bump_type.outputs.type != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: "Data release ${{ steps.tag_version.outputs.new_tag }}"
          generate_release_notes: true
          files: |
            build/characters.json
            build/upgrades.json
            build/campaign.json
            build/character_images.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
